name: Build wheel and sdist

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-wheels:
    name: Build wheel for ${{ matrix.python-version }} ${{ matrix.platform.arch }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["cp310", "cp311", "cp312", "cp313", "cp314"]
        platform:
          - arch: x86_64
            runner: ubuntu-latest
            build: manylinux_x86_64
            cibw_arch: x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            build: manylinux_aarch64
            cibw_arch: aarch64
          - arch: win_amd64
            runner: windows-latest
            build: win_amd64
            cibw_arch: AMD64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install cibuildwheel
      run: python -m pip install cibuildwheel setuptools pybind11
    - name: Build wheels with cibuildwheel
      run: |
        cibuildwheel --output-dir wheelhouse
      env:
        CIBW_BUILD: "${{ matrix.python-version }}-${{ matrix.platform.build }}"
        CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"
        CIBW_TEST_COMMAND: "python {project}/tests/smoke_import_cpp.py"
        CIBW_ARCHS: "${{ matrix.platform.cibw_arch }}"

    - name: Upload wheel artifact
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.python-version }}-${{ matrix.platform.arch }}
        path: wheelhouse/*.whl

  build-sdist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist --outdir dist/

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  upload:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest

    steps:
    - name: Download all wheels
      uses: actions/download-artifact@v4
      with:
        path: dist
    - name: Download sdist artifact
      uses: actions/download-artifact@v4
      with:
        name: sdist
        path: dist

    - name: Flatten all artifacts
      run: |
        mkdir final_dist
        find dist -name '*.whl' -exec cp {} final_dist/ \;
        find dist -name '*.tar.gz' -exec cp {} final_dist/ \;

    - name: Upload all artifact
      uses: actions/upload-artifact@v4
      with:
        name: final_dist
        path: final_dist

